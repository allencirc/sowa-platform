name: CodeQL

# Static analysis for JavaScript/TypeScript. Equivalent to the "default
# setup" in Settings → Code security → CodeQL, committed as code so it
# is versioned and reviewable.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly rescan so alerts don't go stale on low-churn weeks.
    - cron: "17 6 * * 1"

concurrency:
  group: codeql-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        language: ["javascript-typescript"]

    steps:
      - uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
